name: 주식 이슈 브리핑

on:
  # 예약 트리거는 Cloudflare Worker(scheduler/)가 workflow_dispatch로 대신 호출한다.
  #   GitHub schedule cron은 매일 수 시간 지연돼 KST 09/16/23시 정시 발송이 안 됨 → 제거.
  #   (참고: KST 09·16·23시 = UTC 00·07·14시. docs/scheduling-setup.md)
  # schedule:
  #   - cron: "0 0,7,14 * * *"
  workflow_dispatch: {}   # CF Worker 및 수동 "지금 실행" 트리거

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
