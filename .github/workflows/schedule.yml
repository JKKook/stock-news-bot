name: 주식 이슈 브리핑

on:
  # 예약 트리거는 Cloudflare Worker(scheduler/)가 workflow_dispatch로 대신 호출한다.
  #   GitHub schedule cron은 매일 수 시간 지연돼 정시 발송이 안 됨 → 제거. (docs/scheduling-setup.md)
  #   시장 개장/마감 시각에 맞춰 focus(KR|US) + kind(view|closing)를 넘겨 '해당 시장 리서치 노트'를 보낸다.
  workflow_dispatch:
    inputs:
      focus:
        description: "브리핑 대상 시장 — KR(코스피/코스닥) | US(나스닥) | 빈값(전체)"
        required: false
        default: ""
        type: string
      kind:
        description: "브리핑 종류 — view(개장 전 마켓뷰) | closing(마감 후 마켓클로징) | 빈값"
        required: false
        default: ""
        type: string

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # (R1) 정확도 측정 로그를 실행 간 이어받기 — 롤링 키 패턴(alert_state와 동일)
      - uses: actions/cache@v4
        with:
          path: prediction_log.json
          key: prediction-log-${{ github.run_id }}
          restore-keys: |
            prediction-log-

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 시장별 리서치 노트 — CF Worker가 개장/마감 시각에 맞춰 넘긴다(빈값이면 전체 브리핑).
          #   ⚠️ workflow_dispatch 입력은 'github.event.inputs.*'로 읽어야 한다.
          #      'inputs.*'(재사용 워크플로용)는 빈 값으로 평가돼 focus가 사라졌었음.
          BRIEF_FOCUS: ${{ github.event.inputs.focus }}
          BRIEF_KIND: ${{ github.event.inputs.kind }}
