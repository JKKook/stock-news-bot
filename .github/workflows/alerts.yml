name: 속보·급변 알림

on:
  # 예약 트리거는 Cloudflare Worker(scheduler/)가 10분마다 workflow_dispatch로 호출.
  #   GitHub schedule cron은 지연/누락이 잦아 제거. (docs/scheduling-setup.md)
  # schedule:
  #   - cron: "*/10 * * * *"
  workflow_dispatch: {}

# 이전 실행과 겹치지 않게 (상태 파일 경합 방지)
concurrency:
  group: alerts
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 상태 파일(alert_state.json)을 실행 간 이어받기 — 롤링 키 패턴
      - uses: actions/cache@v4
        with:
          path: alert_state.json
          key: alert-state-${{ github.run_id }}
          restore-keys: |
            alert-state-

      - run: pip install -r requirements.txt

      - run: python alerts.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # 속보는 '속보 뉴스봇' 채널로 발송(채널 분리). 미설정 시 코드가 메인으로 폴백.
          DISCORD_ALERT_WEBHOOK_URL: ${{ secrets.DISCORD_ALERT_WEBHOOK_URL }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # 속보 2차 AI 판정(엄청난 호재/악재·지난/반복 속보 필터)
