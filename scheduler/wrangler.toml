name = "stock-news-scheduler"
main = "worker.js"
compatibility_date = "2024-11-01"
workers_dev = false   # cron 전용 — 공개 HTTP 라우트/서브도메인 불필요

# CF cron 은 UTC 기준. worker.js 의 분기 문자열과 정확히 일치해야 함.
#   30 7,23 * * *   → UTC 07:30/23:30 = KST 16:30(마감)/08:30(개장 전)  [국내]
#   30 13,14 * * *  → 나스닥 개장 09:30 ET 후보(EDT=13:30 / EST=14:30 UTC) — Worker가 실제 ET로 판별
#   10 20,21 * * *  → 나스닥 마감 16:10 ET 후보(EDT=20:10 / EST=21:10 UTC) — 서머타임 자동 대응
#   */10 * * * *    → 10분마다 (속보)
[triggers]
crons = ["30 7,23 * * *", "30 13,14 * * *", "10 20,21 * * *", "*/10 * * * *"]

# GITHUB_TOKEN 은 코드에 넣지 말고 secret 으로:  wrangler secret put GITHUB_TOKEN
