name = "stock-news-scheduler"
main = "worker.js"
compatibility_date = "2024-11-01"
workers_dev = false   # cron 전용 — 공개 HTTP 라우트/서브도메인 불필요

# CF cron 은 UTC 기준. worker.js 의 분기 문자열과 정확히 일치해야 함.
#   0 0,7,14 * * *  → 전체 정규 브리핑(종합본, focus 없음) 하루 3회
#                     UTC 00:00 = KST 09:00 / UTC 07:00 = KST 16:00 / UTC 14:00 = KST 23:00
#   0 1,23 * * *    → UTC 01:00 = KST 10:00 [🇰🇷 마켓 뷰]  (코스피 개장 1h 후 관망)
#                     UTC 23:00 = KST 08:00 [🇺🇸 마켓 클로징] (코스피 개장 전, 밤새 나스닥 분석)
#   30 7 * * *      → UTC 07:30 = KST 16:30 [🇰🇷 마켓 클로징] (코스피 마감 후)
#   30 14,15 * * *  → 나스닥 개장 1h 후 = ET 10:30 후보(EDT=14:30 / EST=15:30 UTC)
#                     → Worker가 실제 뉴욕 시각으로 판별(서머타임 자동) [🇺🇸 마켓 뷰]
#   */10 * * * *    → 10분마다 (속보)
[triggers]
crons = ["0 0,7,14 * * *", "0 1,23 * * *", "30 7 * * *", "30 14,15 * * *", "*/10 * * * *"]

# GITHUB_TOKEN 은 코드에 넣지 말고 secret 으로:  wrangler secret put GITHUB_TOKEN
