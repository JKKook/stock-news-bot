name = "stock-news-scheduler"
main = "worker.js"
compatibility_date = "2024-11-01"
workers_dev = false   # cron 전용 — 공개 HTTP 라우트/서브도메인 불필요

# CF cron 은 UTC 기준. worker.js 의 분기 문자열과 정확히 일치해야 함.
#   0 0,7,14 * * *  → UTC 00·07·14시 = KST 09·16·23시  (정규 브리핑)
#   */10 * * * *    → 10분마다                            (속보)
[triggers]
crons = ["0 0,7,14 * * *", "*/10 * * * *"]

# GITHUB_TOKEN 은 코드에 넣지 말고 secret 으로:  wrangler secret put GITHUB_TOKEN
